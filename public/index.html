<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cactus - O Agregador Inteligente</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-color: #0b0b0c;
      --sidebar-bg: #0e0e10;
      --chat-bg: #161618;
      --text-color: #f4f4f5;
      --accent-color: #76b900; 
      --user-msg: #27272a;
      --border-color: #27272a;
      --color-deepseek: #0066ff;
      --color-gemma: #a855f7;
      --color-llama: #ff2a5f;
    }

    *, *::before, *::after, html, body, textarea, input, button, p, span, div, li, h1, h2, h3, summary { 
      box-sizing: border-box; margin: 0; padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important; 
    }

    html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden; background-color: var(--bg-color); color: var(--text-color); }
    body { display: flex; }

    #sidebar { width: 260px; height: 100%; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 16px; gap: 16px; flex-shrink: 0; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
    body:not(.sidebar-open) #sidebar { margin-left: -260px; opacity: 0; pointer-events: none; }
    
    .new-chat-btn { background: transparent; border: 1px dashed #3f3f46; color: #fff; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-align: left; width: 100%; }
    .new-chat-btn:hover { border-color: var(--accent-color); background: rgba(118, 185, 0, 0.05); }

    #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: #a1a1aa; }
    .chat-item:hover { background: #18181b; color: #fff; }
    .chat-item.active { background: #202024; color: #fff; font-weight: 500; border-left: 3px solid var(--accent-color); }
    .chat-item-title { white-space: nowrap; overflow: hidden; text-transform: capitalize; text-overflow: ellipsis; flex: 1; margin-right: 8px; }
    .delete-chat-btn { background: transparent; border: none; color: #71717a; cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 4px; }
    .delete-chat-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

    #sidebar-overlay { display: none; }
    #main-content { flex: 1; display: flex; flex-direction: column; height: 100%; background-image: radial-gradient(circle at 50% -20%, #1e2905 0%, transparent 50%); min-width: 0; overflow: hidden; position: relative; }

    header { padding: 10px 16px; border-bottom: 1px solid var(--border-color); background: rgba(18, 18, 20, 0.6); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; height: 65px; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; height: 100%; }
    .logo-header { height: 50px; width: auto; display: block; }
    
    .menu-toggle-btn { background: #18181b; border: 1px solid var(--border-color); color: #fff; font-size: 1.2rem; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    .settings-toggle-btn { background: #18181b; border: 1px solid var(--border-color); color: #a1a1aa; padding: 8px 12px; border-radius: 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }

    #settings-panel { display: none; position: absolute; top: 65px; right: 16px; z-index: 1001; background: #121214; border: 1px solid var(--border-color); max-width: 450px; width: calc(100% - 32px); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .panel-section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #1f1f22; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-title { font-size: 0.9rem; font-weight: 700; color: #fff; }
    
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #27272a; transition: .3s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #a1a1aa; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #0066ff; }
    input:checked + .slider:before { transform: translateX(16px); background-color: #fff; }

    .panel-textarea { width: 100%; background: #18181b; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; color: #fff; font-size: 0.85rem; resize: vertical; height: 60px; outline: none; }
    .save-settings-btn { background: #0066ff; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 5px; }

    #chat-container { flex: 1 1 0%; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
    .message { padding: 12px 16px; border-radius: 20px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
    .user { background-color: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; }
    .ai { background-color: var(--chat-bg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); width: 100%; max-width: 90%; }

    .ai-render-content img { max-width: 100%; max-height: 400px; border-radius: 12px; margin-top: 8px; border: 1px solid var(--border-color); display: block; }
    .ai-render-content h1, .ai-render-content h2, .ai-render-content h3 { color: var(--accent-color); margin: 12px 0 6px 0; font-size: 1.1rem; font-weight: 700; }
    .ai-render-content p { margin-bottom: 10px; color: #e4e4e7; }
    .ai-render-content ul, .ai-render-content ol { margin-left: 18px; margin-bottom: 10px; }
    .ai-render-content li { color: #e4e4e7; }

    .msg-action-bar { display: flex; gap: 14px; margin-top: 10px; padding-top: 6px; border-top: 1px solid rgba(255, 255, 255, 0.04); align-items: center; }
    .action-btn { background: transparent; border: none; color: #71717a; cursor: pointer; font-size: 1.05rem; padding: 4px 6px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
    .action-btn:hover { color: var(--accent-color); background: rgba(255, 255, 255, 0.05); }
    .action-btn.active-like { color: #22c55e !important; }
    .action-btn.active-dislike { color: #ef4444 !important; }

    .system-status { align-self: center; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #a1a1aa; background: #18181b; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); }

    .backstage { margin-top: 10px; background: #09090b; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
    .backstage summary { cursor: pointer; color: var(--accent-color); font-weight: 600; font-size: 0.8rem; padding: 10px 14px; background: #111113; }
    .backstage-content { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    .model-card { background: #141416; border-radius: 8px; padding: 10px 12px; font-size: 0.85rem; border-left: 4px solid #3f3f46; overflow-x: auto; }
    .model-card.deepseek { border-left-color: var(--color-deepseek); }
    .model-card.gemma { border-left-color: var(--color-gemma); }
    .model-card.llama { border-left-color: var(--color-llama); }
    .model-text { color: #d4d4d8; white-space: pre-line; }

    #input-area-wrapper { display: flex; flex-direction: column; width: 100%; background-color: var(--bg-color); flex-shrink: 0; padding-bottom: calc(env(safe-area-inset-bottom) + 8px); }
    #preview-attachment-box { display: none; align-items: center; gap: 10px; background: #1c1c1f; padding: 8px 16px; border-top: 1px solid var(--border-color); font-size: 0.85rem; color: #e4e4e7; }
    .preview-thumb { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; border: 1px solid #3f3f46; display: none; }
    .remove-attachment-btn { background: transparent; border: none; color: #ef4444; font-weight: bold; cursor: pointer; }

    #input-container { padding: 4px 16px 4px 16px; width: 100%; display: flex; gap: 10px; align-items: flex-end; }
    .input-wrapper { flex: 1; background-color: var(--chat-bg); border: 1px solid var(--border-color); border-radius: 24px; display: flex; align-items: flex-end; padding: 0 12px 3px 4px; min-width: 0; }
    .input-wrapper:focus-within { border-color: var(--accent-color); }
    
    .icon-btn-input { background: transparent; border: none; font-size: 1.1rem; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.5; color: #fff; margin-bottom: 2px; }
    .icon-btn-input:hover { opacity: 1; background: rgba(255,255,255,0.05); }
    .web-search-toggle.active { opacity: 1; background: rgba(0, 102, 255, 0.15); border: 1px solid rgba(0, 102, 255, 0.3); color: #0066ff; }

    textarea { flex: 1; background: transparent; border: none; padding: 12px 8px; color: var(--text-color); resize: none; height: 44px; max-height: 140px; outline: none; font-size: 0.95rem; overflow-y: hidden; }

    button#send-btn { background-color: var(--accent-color); color: #000; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(118, 185, 0, 0.2); flex-shrink: 0; margin-bottom: 2px; }
    button#send-btn:disabled { background-color: #27272a; color: #71717a; cursor: not-allowed; }

    .disclaimer { font-size: 0.72rem; color: #71717a; text-align: center; padding-top: 4px; padding-bottom: 4px; background-color: var(--bg-color); width: 100%; }

    @media (max-width: 768px) {
      #sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 2000; transform: translateX(-100%); margin-left: 0 !important; }
      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open #sidebar-overlay { display: block; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 1999; }
    }
  </style>
</head>
<body>

  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div id="sidebar">
    <button class="new-chat-btn" onclick="criarNovoChat(); fecharSidebarNoCelular();">➕ Novo chat</button>
    <div id="chat-list"></div>
  </div>

  <div id="main-content">
    <header>
      <div class="header-left">
        <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
        <img src="Logo Cactus.png" alt="Cactus" class="logo-header">
      </div>
      <button class="settings-toggle-btn" onclick="toggleSettingsPanel()">⚙️ Configurações</button>
      
      <div id="settings-panel">
        <div class="panel-section">
          <div class="section-header">
            <span class="section-title">Suas instruções para o Cactus (Regras)</span>
            <label class="switch">
              <input type="checkbox" id="rules-toggle" onchange="saveSettings()">
              <span class="slider"></span>
            </label>
          </div>
          <textarea id="rules-input" class="panel-textarea" placeholder="Ex: 'Responda sempre em tópicos curtos'"></textarea>
        </div>

        <div class="panel-section">
          <div class="section-header">
            <span class="section-title">Memória ativa (Fatos sobre você)</span>
            <label class="switch">
              <input type="checkbox" id="memory-toggle" onchange="saveSettings()">
              <span class="slider"></span>
            </label>
          </div>
          <textarea id="memory-input" class="panel-textarea" placeholder="Ex: 'Estudo Zootecnia no Ceará'"></textarea>
        </div>
        <button class="save-settings-btn" onclick="saveSettings(true)">Salvar Alterações</button>
      </div>
    </header>

    <div id="chat-container"></div>

    <div id="input-area-wrapper">
      <div id="preview-attachment-box">
        <img id="attachment-img-preview" class="preview-thumb" alt="Preview">
        <span id="attachment-name-text">arquivo.txt</span>
        <button class="remove-attachment-btn" onclick="limparAnexo()">✕</button>
      </div>

      <div id="input-container">
        <div class="input-wrapper">
          <button class="icon-btn-input" onclick="document.getElementById('file-input').click()" title="Anexar Arquivo">📎</button>
          <input type="file" id="file-input" style="display: none;" onchange="processarArquivoLocal(this)" accept="image/*,text/plain,application/json,text/csv,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
          
          <button id="web-toggle-btn" class="icon-btn-input web-search-toggle" onclick="toggleWebSearch()" title="Ativar Internet">🌐</button>
          <textarea id="user-input" placeholder="Faça uma pergunta ou use /gerar para criar imagens..." rows="1"></textarea>
        </div>
        <button id="send-btn" onclick="gerenciarCliqueBotaoEnvio()">➜</button>
      </div>
      <div class="disclaimer">O Cactus é uma IA e pode cometer erros.</div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatListElement = document.getElementById('chat-list');

    let listaChats = [], idChatAtivo = null, pesquisaWebAtiva = false, arquivoCarregado = null, thoughtInterval = null;
    let activeAbortController = null; // CONTROLADOR ASSÍNCRONO CONTRA CONGELAMENTO DE REQUISITOS

    window.onload = async function() {
      try {
        document.getElementById('rules-input').value = localStorage.getItem('teca_rules') || '';
        document.getElementById('memory-input').value = localStorage.getItem('teca_memory') || '';
        document.getElementById('rules-toggle').checked = localStorage.getItem('teca_rules_enabled') === 'true';
        document.getElementById('memory-toggle').checked = localStorage.getItem('teca_memory_enabled') === 'true';

        if (localStorage.getItem('teca_web_search') === 'true') {
          pesquisaWebAtiva = true;
          document.getElementById('web-toggle-btn').classList.add('active');
        }

        if (window.innerWidth > 768) document.body.classList.add('sidebar-open');
        await carregarListaChatsDoBanco();
      } catch (errInit) {
        console.error("Erro na inicialização:", errInit);
      }
    };

    async function carregarListaChatsDoBanco() {
      try {
        const res = await fetch('/api/chats');
        listaChats = await res.json();
        renderrarInstanciaBarraLateral();
        
        if (listaChats.length === 0) {
          await criarNovoChat();
        } else {
          const ultimoSalvo = localStorage.getItem('teca_id_chat_ativo');
          const existe = listaChats.some(c => c.id === ultimoSalvo);
          await carregarChat(existe ? ultimoSalvo : listaChats[0].id);
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function recarregarApenasTitulosDaBarraLateral() {
      try {
        const res = await fetch('/api/chats');
        listaChats = await res.json();
        renderrarInstanciaBarraLateral();
      } catch (e) {
        console.error(e);
      }
    }

    userInput.addEventListener('input', function() {
      this.style.height = '44px'; 
      this.style.height = this.scrollHeight + 'px'; 
      if (this.scrollHeight > 140) this.style.overflowY = 'auto'; else this.style.overflowY = 'hidden';
      chatContainer.scrollTop = chatContainer.scrollHeight; 
    });

    function processarArquivoLocal(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      
      if (file.type.startsWith('image/')) {
        reader.onload = function(e) {
          arquivoCarregado = { tipo: 'imagem', nome: file.name, conteudo: e.target.result };
          document.getElementById('attachment-img-preview').src = arquivoCarregado.conteudo;
          document.getElementById('attachment-img-preview').style.display = 'block';
          mostrarBarraAnexo(file.name);
          userInput.focus(); // CORREÇÃO: Devolve o foco imediato para digitação de texto no celular
        };
        reader.readAsDataURL(file);
      } else {
        reader.onload = function(e) {
          arquivoCarregado = { tipo: 'documento', nome: file.name, conteudo: e.target.result };
          document.getElementById('attachment-img-preview').style.display = 'none';
          mostrarBarraAnexo(`📄 ${file.name}`);
          userInput.focus(); // CORREÇÃO: Devolve o foco imediato para digitação de texto no celular
        };
        reader.readAsDataURL(file);
      }
    }

    function mostrarBarraAnexo(nome) {
      document.getElementById('attachment-name-text').innerText = nome;
      document.getElementById('preview-attachment-box').style.display = 'flex';
    }

    function limparAnexo() {
      arquivoCarregado = null;
      document.getElementById('file-input').value = '';
      document.getElementById('preview-attachment-box').style.display = 'none';
    }

    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
    function fecharSidebarNoCelular() { if(window.innerWidth <= 768) document.body.classList.remove('sidebar-open'); }

    function toggleWebSearch() {
      pesquisaWebAtiva = !pesquisaWebAtiva;
      localStorage.setItem('teca_web_search', pesquisaWebAtiva);
      document.getElementById('web-toggle-btn').classList.toggle('active', pesquisaWebAtiva);
    }

    async function criarNovoChat() {
      try {
        const res = await fetch('/api/chats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: 'Novo Chat' })
        });
        const novoChat = await res.json();
        idChatAtivo = novoChat.id;
        localStorage.setItem('teca_id_chat_ativo', idChatAtivo);
        await carregarListaChatsDoBanco();
      } catch (e) {
        console.error(e);
      }
    }

    async function carregarChat(id) {
      try {
        idChatAtivo = id;
        localStorage.setItem('teca_id_chat_ativo', idChatAtivo);
        
        document.querySelectorAll('.chat-item').forEach(item => {
          item.classList.toggle('active', item.getAttribute('data-id') === id);
        });

        chatContainer.innerHTML = '<div class="system-status">Barramento de Sincronização Relacional Ativo</div>';
        
        const res = await fetch(`/api/chats/${id}/mensagens`);
        const mensagens = await res.json();
        
        if (mensagens && mensagens.length > 0) {
          mensagens.forEach(msg => {
            if (msg.role === 'user') adicionarMensagemDiv(msg.content, 'user');
            else adicionarMensagemDivComBastidores(msg.content, msg.auditoria || {});
          });
        }
        fecharSidebarNoCelular();
        chatContainer.scrollTop = chatContainer.scrollHeight;
      } catch (err) {
        console.error("Erro ao carregar mensagens:", err);
      }
    }

    async function deleteChat(id, event) {
      try {
        await fetch(`/api/chats/${id}`, { method: 'DELETE' });
        await carregarListaChatsDoBanco();
      } catch (e) {
        console.error(e);
      }
    }

    function renderrarInstanciaBarraLateral() {
      chatListElement.innerHTML = '';
      listaChats.forEach(chat => {
        const item = document.createElement('div');
        item.className = `chat-item ${chat.id === idChatAtivo ? 'active' : ''}`;
        item.setAttribute('data-id', chat.id);
        item.onclick = () => carregarChat(chat.id);

        const titulo = document.createElement('span');
        titulo.className = 'chat-item-title';
        titulo.innerText = chat.title;

        const botaoDeletar = document.createElement('button');
        botaoDeletar.className = 'delete-chat-btn';
        botaoDeletar.innerHTML = '🗑️';
        botaoDeletar.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id, e); };

        item.appendChild(titulo);
        item.appendChild(botaoDeletar);
        chatListElement.appendChild(item);
      });
    }

    function gerenciarCliqueBotaoEnvio() {
      if (sendBtn.innerText === '🛑') {
        cancelarRequisicaoAtiva();
      } else {
        enviarPergunta();
      }
    }

    function cancelarRequisicaoAtiva() {
      if (activeAbortController) {
        activeAbortController.abort();
        clearInterval(thoughtInterval);
        document.querySelector('.pulse')?.remove();
        adicionarMensagemDiv("⚠️ Geração interrompida pelo usuário.", "ai");
        
        // Restaura a usabilidade dos botões gráficos
        userInput.disabled = false;
        sendBtn.disabled = false;
        sendBtn.innerText = '➜';
        sendBtn.style.backgroundColor = 'var(--accent-color)';
        userInput.focus();
      }
    }

    async function enviarPergunta() {
      const texto = userInput.value.trim();
      if (!texto && !arquivoCarregado) return;

      let promptFinalEnvio = texto;
      if (!texto && arquivoCarregado) promptFinalEnvio = `Analise este arquivo anexado: ${arquivoCarregado.nome}`;

      userInput.value = '';
      userInput.style.height = '44px';

      // Transforma o botão de envio em um botão de parada vermelho
      userInput.disabled = false; // Deixa o campo aberto caso queira usar comandos ou parar
      sendBtn.innerText = '🛑';
      sendBtn.style.backgroundColor = '#ef4444';

      let visualTexto = promptFinalEnvio;
      if (arquivoCarregado && arquivoCarregado.tipo === 'imagem') {
        visualTexto = `<img src="${arquivoCarregado.conteudo}" style="max-width:100%; max-height:200px; border-radius:8px; display:block; margin-bottom:5px;">` + promptFinalEnvio;
      } else if (arquivoCarregado && arquivoCarregado.tipo === 'documento') {
        visualTexto = `📂 **Documento enviado para análise:** \`${arquivoCarregado.nome}\`\n\n${promptFinalEnvio}`;
      }

      adicionarMensagemDiv(visualTexto, 'user');

      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message ai pulse';
      loadingDiv.innerText = "🔍 Gravando dados e acionando pipeline de produção...";
      chatContainer.appendChild(loadingDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      const anexoParaEnvio = arquivoCarregado;
      limparAnexo();

      // Inicializa o barramento de abortamento do canal HTTP
      activeAbortController = new AbortController();
      const signal = activeAbortController.signal;

      try {
        const response = await fetch('/api/perguntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            chatId: idChatAtivo,
            ultimaMensagem: promptFinalEnvio, 
            customInstructions: document.getElementById('rules-toggle').checked ? localStorage.getItem('teca_rules') : '',
            memoryContext: document.getElementById('memory-toggle').checked ? localStorage.getItem('teca_memory') : '',
            pesquisaWeb: pesquisaWebAtiva,
            arquivoAnexo: anexoParaEnvio
          }),
          signal: signal
        });

        const data = await response.json();
        loadingDiv.remove();

        if (data.error) {
          adicionarMensagemDiv('Ops! Houve uma interrupção: ' + data.error, 'ai');
        } else {
          // CORREÇÃO VISUAL: Imprime o bloco na tela sem apagar o histórico de mensagens já renderizado
          adicionarMensagemDivComBastidores(data.respostaFinal, data.auditoria);
          await recarregarApenasTitulosDaBarraLateral();
        }
      } catch (error) {
        if (error.name === 'AbortError') {
          console.log("Fluxo cancelado via interface.");
          return;
        }
        loadingDiv.remove(); 
        adicionarMensagemDiv('Falha crítica de comunicação com o cluster Render.', 'ai');
      }

      // Restaura o estado padrão do botão de gatilho
      sendBtn.innerText = '➜';
      sendBtn.style.backgroundColor = 'var(--accent-color)';
      userInput.focus();
    }

    function adicionarMensagemDiv(texto, remetente) {
      const div = document.createElement('div');
      div.className = `message ${remetente}`;
      if (remetente === 'user') div.innerHTML = texto; 
      else { div.className += ' ai-render-content'; div.innerHTML = marked.parse(texto || ''); }
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function adicionarMensagemDivComBastidores(respostaFinal, auditoria) {
      const msgConteudo = document.createElement('div');
      msgConteudo.className = 'message ai';
      
      const textoFinal = document.createElement('div');
      textoFinal.className = 'ai-render-content';
      textoFinal.innerHTML = marked.parse(respostaFinal || '');
      msgConteudo.appendChild(textoFinal);

      const actionBar = document.createElement('div');
      actionBar.className = 'msg-action-bar';
      
      actionBar.innerHTML = `
        <button class="action-btn" onclick="alternarFeedback(this, 'like')" title="Gostei">👍</button>
        <button class="action-btn" onclick="alternarFeedback(this, 'dislike')" title="Não gostei">👎</button>
      `;
      msgConteudo.appendChild(actionBar);

      const detalhes = document.createElement('details');
      detalhes.className = 'backstage';
      detalhes.innerHTML = `
        <summary>🔍 Ver os bastidores da decisão</summary>
        <div class="backstage-content">
          <div class="model-card" style="border-left-color: #a1a1aa; background: #111113; margin-bottom: 6px;">
            <div class="model-badge" style="color: #a1a1aa;">🌐 Sincronização Relacional PostgreSQL / RAG</div>
            <div class="model-text" style="font-style: italic; color: #a1a1aa;">${auditoria.webRaw || 'Nenhum dado coletado.'}</div>
          </div>
          <div class="model-card deepseek"><div class="model-badge">🤖 DeepSeek Engine</div><div class="model-text">${auditoria.deepseek || 'N/A'}</div></div>
          <div class="model-card gemma"><div class="model-badge">🤖 Llama 8B Engine</div><div class="model-text">${auditoria.gemma || 'N/A'}</div></div>
          <div class="model-card llama"><div class="model-badge">🤖 Llama 70B Core</div><div class="model-text">${auditoria.llama8b || 'N/A'}</div></div>
        </div>
      `;
      msgConteudo.appendChild(detalhes);
      chatContainer.appendChild(msgConteudo);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function alternarFeedback(btn, tipo) {
      const bar = btn.parentElement;
      const botoes = bar.querySelectorAll('.action-btn');
      if (tipo === 'like') {
        btn.classList.toggle('active-like'); botoes[1].classList.remove('active-dislike');
      } else {
        btn.classList.toggle('active-dislike'); botoes[0].classList.remove('active-like');
      }
    }

    function saveSettings(alertUser = false) {
      localStorage.setItem('teca_rules', document.getElementById('rules-input').value);
      localStorage.setItem('teca_memory', document.getElementById('memory-input').value);
      localStorage.setItem('teca_rules_enabled', document.getElementById('rules-toggle').checked);
      localStorage.setItem('teca_memory_enabled', document.getElementById('memory-toggle').checked);
      if(alertUser) alert('Configurações salvas!');
    }
  </script>
</body>
</html>
