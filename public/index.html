<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TecAI - O Agregador Inteligente</title>
  <style>
    :root {
      --bg-color: #131314;
      --chat-bg: #1e1e20;
      --text-color: #e3e3e3;
      --accent-color: #76b900; 
      --user-msg: #2b2c2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; }

    header { padding: 20px; text-align: center; border-bottom: 1px solid #2d2d30; background: #1a1a1c; }
    header h1 { font-size: 1.5rem; color: var(--accent-color); }
    header p { font-size: 0.85rem; color: #9aa0a6; margin-top: 4px; }

    #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 800px; width: 100%; margin: 0 auto; }

    .message { padding: 14px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
    .user { background-color: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai { background-color: var(--chat-bg); align-self: flex-start; border-bottom-left-radius: 4px; border-left: 4px solid var(--accent-color); }

    .system-status { align-self: center; font-size: 0.8rem; color: #80868b; background: #202124; padding: 6px 12px; border-radius: 12px; }

    .backstage { margin-top: 10px; padding: 10px; background: #111; border-radius: 8px; font-size: 0.8rem; border: 1px solid #333; }
    .backstage summary { cursor: pointer; color: var(--accent-color); font-weight: bold; outline: none; }
    .backstage-content { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }

    #input-container { padding: 20px; max-width: 800px; width: 100%; margin: 0 auto; display: flex; gap: 10px; background-color: var(--bg-color); }
    textarea { flex: 1; background-color: var(--chat-bg); border: 1px solid #3c4043; border-radius: 24px; padding: 14px 20px; color: var(--text-color); resize: none; height: 52px; outline: none; font-size: 0.95rem; }
    textarea:focus { border-color: var(--accent-color); }

    button { background-color: var(--accent-color); color: #000; border: none; border-radius: 50%; width: 52px; height: 52px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: transform 0.1s; }
    button:hover { transform: scale(1.05); background-color: #8ed01c; }
    button:disabled { background-color: #3c4043; cursor: not-allowed; transform: none; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h1>TecAI</h1>
    <p>Os modelos da NVIDIA competem. O "Juiz" escolhe a melhor resposta.</p>
  </header>

  <div id="chat-container">
    <div class="system-status">Modo de batalha tripla ativado: DeepSeek, Gemma & MiniMax</div>
  </div>

  <div id="input-container">
    <textarea id="user-input" placeholder="Faça uma pergunta para as IAs..." rows="1"></textarea>
    <button id="send-btn" onclick="enviarPergunta()">➜</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarPergunta();
      }
    });

    async function enviarPergunta() {
      const texto = userInput.value.trim();
      if (!texto) return;

      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;

      adicionarMensagem(texto, 'user');
      const loadingDiv = adicionarMensagem('Pensando e avaliando as respostas...', 'ai');

      try {
        const response = await fetch('/api/perguntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pergunta: texto })
        });

        const data = await response.json();
        loadingDiv.remove();

        if (data.error) {
          adicionarMensagem('Ops! Tive um problema ao consultar as IAs. Detalhe: ' + data.error, 'ai');
        } else {
          const msgConteudo = document.createElement('div');
          msgConteudo.className = 'message ai';
          msgConteudo.innerText = data.respostaFinal;

          const detalhes = document.createElement('details');
          detalhes.className = 'backstage';
          detalhes.innerHTML = `
            <summary>🔍 Ver os bastidores da decisão</summary>
            <div class="backstage-content">
              <p><strong>Filtro 1 (DeepSeek-v4-Flash):</strong> ${data.auditoria.deepseek}</p>
              <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
              <p><strong>Filtro 2 (DiffusionGemma-26B):</strong> ${data.auditoria.gemma}</p>
              <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
              <p><strong>Filtro 3 (MiniMax-M3):</strong> ${data.auditoria.minimax}</p>
            </div>
          `;
          msgConteudo.appendChild(detalhes);
          chatContainer.appendChild(msgConteudo);
        }

      } catch (error) {
        loadingDiv.remove();
        adicionarMensagem('Erro de conexão com o servidor.', 'ai');
        console.error(error);
      }

      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.focus();
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function adicionarMensagem(texto, remetente) {
      const div = document.createElement('div');
      div.className = `message ${remetente}`;
      div.innerText = texto;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
