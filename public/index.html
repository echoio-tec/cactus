<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cactus - O Agregador Inteligente</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --bg-color: #0b0b0c; --sidebar-bg: #0e0e10; --chat-bg: #161618; --text-color: #f4f4f5; --accent-color: #76b900; --user-msg: #27272a; --border-color: #27272a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 16px; gap: 16px; flex-shrink: 0; }
    .new-chat-btn { background: transparent; border: 1px dashed #3f3f46; color: #fff; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: left; }
    .new-chat-btn:hover { border-color: var(--accent-color); }
    #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: #a1a1aa; }
    .chat-item.active { background: #202024; color: #fff; border-left: 3px solid var(--accent-color); }
    #main-content { flex: 1; display: flex; flex-direction: column; }
    header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    .logo-header { height: 40px; }
    #chat-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .message { padding: 12px 16px; border-radius: 20px; max-width: 85%; word-wrap: break-word; }
    .user { background-color: var(--user-msg); align-self: flex-end; }
    .ai { background-color: var(--chat-bg); align-self: flex-start; border: 1px solid var(--border-color); width: 90%; }
    #input-area-wrapper { padding: 16px; border-top: 1px solid var(--border-color); }
    .input-wrapper { background: var(--chat-bg); border: 1px solid var(--border-color); border-radius: 24px; display: flex; align-items: center; padding: 4px 12px; }
    textarea { flex: 1; background: transparent; border: none; color: white; resize: none; height: 40px; outline: none; padding: 10px; }
    button#send-btn { background: var(--accent-color); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="sidebar">
    <button class="new-chat-btn" onclick="criarNovoChat()">➕ Novo chat</button>
    <div id="chat-list"></div>
  </div>
  <div id="main-content">
    <header>
      <img src="Logo Cactus.png" alt="Cactus" class="logo-header">
      <button onclick="toggleSettings()">⚙️</button>
    </header>
    <div id="chat-container"></div>
    <div id="input-area-wrapper">
      <div class="input-wrapper">
        <input type="file" id="file-input" style="display: none;" onchange="processarArquivo(this)" accept="image/*">
        <button onclick="document.getElementById('file-input').click()">📎</button>
        <textarea id="user-input" placeholder="Pergunte ao Cactus..."></textarea>
        <button id="send-btn" onclick="enviarPergunta()">➜</button>
      </div>
    </div>
  </div>

  <script>
    let listaChats = JSON.parse(localStorage.getItem('teca_lista_chats') || '[]');
    let idChatAtivo = localStorage.getItem('teca_id_chat_ativo');
    let arquivoCarregado = null;

    function renderizarBarraLateral() {
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      listaChats.forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item ${chat.id === idChatAtivo ? 'active' : ''}`;
        div.innerText = chat.title;
        div.onclick = () => { idChatAtivo = chat.id; renderizarChat(); renderizarBarraLateral(); };
        list.appendChild(div);
      });
    }

    function criarNovoChat() {
      idChatAtivo = 'chat_' + Date.now();
      listaChats.unshift({ id: idChatAtivo, title: 'Novo Chat', messages: [] });
      renderizarBarraLateral();
      renderizarChat();
      localStorage.setItem('teca_lista_chats', JSON.stringify(listaChats));
    }

    function renderizarChat() {
      const container = document.getElementById('chat-container');
      container.innerHTML = '';
      const chat = listaChats.find(c => c.id === idChatAtivo);
      if(chat) {
        chat.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div.innerHTML = marked.parse(m.content);
          container.appendChild(div);
        });
      }
    }

    async function enviarPergunta() {
      const input = document.getElementById('user-input');
      const texto = input.value.trim();
      if (!texto && !arquivoCarregado) return;
      input.value = '';
      const chat = listaChats.find(c => c.id === idChatAtivo);
      chat.messages.push({ role: 'user', content: texto });
      renderizarChat();

      try {
        const res = await fetch('/api/perguntar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ historico: chat.messages, arquivoAnexo: arquivoCarregado })
        });
        const data = await res.json();
        chat.messages.push({ role: 'assistant', content: data.respostaFinal });
        renderizarChat();
        arquivoCarregado = null;
      } catch (e) { alert('Erro: ' + e.message); }
    }

    function processarArquivo(input) {
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        arquivoCarregado = { tipo: 'imagem', nome: file.name, conteudo: e.target.result };
        alert('Imagem pronta para o Cactus!');
      };
      reader.readAsDataURL(file);
    }
    
    renderizarBarraLateral();
    renderizarChat();
  </script>
</body>
</html>
