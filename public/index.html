<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cactus - Agregador Inteligente</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0b0b0c; --side: #0e0e10; --chat: #161618; --accent: #76b900; --text: #f4f4f5; --border: #27272a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    #sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; gap: 16px; }
    .btn-new { background: transparent; border: 1px dashed #3f3f46; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
    .chat-item { padding: 10px; color: #a1a1aa; cursor: pointer; border-radius: 8px; }
    .chat-item.active { background: #202024; color: white; border-left: 3px solid var(--accent); }
    
    #main { flex: 1; display: flex; flex-direction: column; }
    header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    
    #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { padding: 12px; border-radius: 12px; max-width: 80%; }
    .user { background: #27272a; align-self: flex-end; }
    .ai { background: var(--chat-bg); border: 1px solid var(--border); align-self: flex-start; }
    
    #input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    textarea { flex: 1; background: #1c1c1f; color: white; border: none; padding: 12px; border-radius: 20px; outline: none; height: 50px; }
    button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 20px; color: black; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="sidebar">
    <button class="btn-new" onclick="criarNovoChat()">➕ Novo Chat</button>
    <div id="chat-list"></div>
  </div>
  <div id="main">
    <header>
      <h3>Cactus IA</h3>
      <button onclick="alert('Configurações em breve')">⚙️</button>
    </header>
    <div id="chat-container"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Digite uma pergunta ou /gerar [imagem]..."></textarea>
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </div>

  <script>
    let chats = JSON.parse(localStorage.getItem('chats') || '[]');
    let chatAtivo = localStorage.getItem('chatAtivo') || null;

    function renderizarLista() {
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      chats.forEach(c => {
        const div = document.createElement('div');
        div.className = `chat-item ${c.id === chatAtivo ? 'active' : ''}`;
        div.innerText = c.title;
        div.onclick = () => { chatAtivo = c.id; renderizarChat(); renderizarLista(); };
        list.appendChild(div);
      });
    }

    function criarNovoChat() {
      const id = 'c_' + Date.now();
      chats.unshift({ id, title: 'Novo Chat', msgs: [] });
      chatAtivo = id;
      renderizarLista(); renderizarChat();
      localStorage.setItem('chats', JSON.stringify(chats));
    }

    function renderizarChat() {
      const container = document.getElementById('chat-container');
      container.innerHTML = '';
      const chat = chats.find(c => c.id === chatAtivo);
      if(chat) chat.msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + m.role;
        div.innerHTML = marked.parse(m.content);
        container.appendChild(div);
      });
    }

    async function enviarMensagem() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if(!text) return;
      
      const chat = chats.find(c => c.id === chatAtivo);
      chat.msgs.push({ role: 'user', content: text });
      input.value = '';
      renderizarChat();

      try {
        const res = await fetch('/api/perguntar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ historico: chat.msgs })
        });
        const data = await res.json();
        chat.msgs.push({ role: 'assistant', content: data.respostaFinal });
        renderizarChat();
      } catch(e) { alert('Erro no servidor'); }
    }
    
    if(chats.length === 0) criarNovoChat();
    renderizarLista();
  </script>
</body>
</html>
